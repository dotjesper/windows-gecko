name: Feature Request
description: Suggest a new feature or improvement for Windows gecko.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe your idea below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature you would like.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you have considered.
    validations:
      required: false

  - type: dropdown
    id: module
    attributes:
      label: Related Module
      description: Which feature module is this related to (if any)?
      options:
        - Windows Apps
        - Windows Branding
        - Windows Config
        - Windows Features
        - Windows Files
        - Windows Groups
        - Windows Registry
        - Windows Run
        - Windows Scheduled Tasks
        - Windows Services
        - Windows TCR
        - Core / General
        - New Module
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or mockups about the feature request.
    validations:
      required: false
