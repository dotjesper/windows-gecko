name: Bug Report
description: Report a bug or unexpected behavior in Windows gecko.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure '...'
        2. Run gecko.ps1 with '...'
        3. See error in '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: windows-version
    attributes:
      label: Windows Version
      description: Which version of Windows are you running?
      options:
        - Windows 11 24H2
        - Windows 11 23H2
        - Windows 11 22H2
        - Windows 10 22H2
        - Other (specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: context
    attributes:
      label: Execution Context
      description: Which context was the script running in?
      options:
        - SYSTEM
        - USER
    validations:
      required: true

  - type: dropdown
    id: language-mode
    attributes:
      label: PowerShell Language Mode
      description: Which PowerShell language mode is in effect?
      options:
        - Full Language
        - Constrained Language
        - Unknown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: Paste relevant log entries from the CMTrace/IME log file.
      render: text
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Configuration (JSON)
      description: Paste the relevant section of your configuration file. Remove any sensitive information before sharing.
      render: json
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information about the problem.
    validations:
      required: false
